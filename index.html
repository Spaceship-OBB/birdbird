<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>飞飞鸟</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; }
        #game-area { position: relative; width: 100%; flex: 1; background: #87CEEB; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; }
        #rank-panel { background: #fff; color: #ff69b4; padding: 10px; border-top: 4px solid #ff69b4; min-height: 120px; z-index: 100; }
        .rank-title { text-align: center; font-weight: bold; font-size: 16px; margin-bottom: 8px; border-bottom: 1px dashed #ffb6c1; padding-bottom: 4px; }
        .rank-list { font-size: 13px; color: #555; }
        .rank-item { display: flex; justify-content: space-between; margin: 4px 0; }
        .rank-item.top { color: #ff1493; font-weight: bold; }
    </style>
</head>
<body>
    <div id="game-area">
        <canvas id="cvs"></canvas>
    </div>
    <div id="rank-panel">
        <div class="rank-title">🏆 全球荣誉榜</div>
        <div id="rank-list" class="rank-list"></div>
    </div>

    <script>
        const cvs = document.getElementById('cvs');
        const ctx = cvs.getContext('2d');
        const rankListEl = document.getElementById('rank-list');

        
        let bird, pipes, clouds, score, state, speed, lastTime;
        const pipeColors = ['#FFB6C1', '#98FB98', '#87CEFA', '#DDA0DD', '#F0E68C', '#FFA07A'];

        // --- 核心物理常数（基于时间步进，不再受刷新率影响） ---
        const cfg = {
            gravity: 1100,    // 每秒下落像素
            jump: -380,       // 每次起跳冲力
            maxV: 550,        // 终端速度限速
            baseSpeed: 160,   // 管道移动速度
            gapRatio: 0.42,   // 缺口比例
            spacingRatio: 0.9 // 管道间距比例
        };

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const rect = cvs.getBoundingClientRect();
            cvs.width = rect.width * dpr;
            cvs.height = rect.height * dpr;
            ctx.scale(dpr, dpr);
            cvs.lW = rect.width;
            cvs.lH = rect.height;
        }

        function init() {
            resize();
            const vw = cvs.lW; const vh = cvs.lH;
            // 初始数据
            bird = { x: vw * 0.25, y: vh * 0.4, v: 0, r: vw * 0.045, angle: 0, frame: 0 };
            pipes = []; 
            score = 0; 
            state = 'WAIT'; 
            speed = cfg.baseSpeed;
            lastTime = performance.now();
            
            // 初始化云朵
            clouds = [];
            for(let i=0; i<6; i++) {
                clouds.push({
                    x: Math.random() * vw,
                    y: Math.random() * vh * 0.4,
                    r: 20 + Math.random() * 25
                });
            }
            updateRankDisplay();
        }

        function drawBird(x, y, angle, frame) {
            const size = Math.min(cvs.lW * 0.12, 55); 
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);

            // 1. 身体
            let grad = ctx.createRadialGradient(0, 0, 5, 0, 0, size/1.5);
            grad.addColorStop(0, "#FFC0CB"); grad.addColorStop(1, "#FF69B4");
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.roundRect(-size/2, -size/2, size, size, 15); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();

            // 2. 小翅膀 (随时间煽动)
            ctx.fillStyle = "#FF1493";
            let wingSwing = Math.sin(frame * 0.2) * (size / 2.5);
            ctx.beginPath();
            ctx.ellipse(-size/3, size/8, size/3, Math.abs(wingSwing) + 2, 0, 0, Math.PI * 2);
            ctx.fill(); ctx.stroke();

            // 3. 眼睛
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(size/4, -size/4, size/4, 0, 6.28); ctx.fill();
            ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(size/4 + 3, -size/4, size/10, 0, 6.28); ctx.fill();
            
            // 4. 嘴巴
            ctx.fillStyle = "#FFA500"; ctx.beginPath();
            ctx.moveTo(size/2 - 2, 0); ctx.lineTo(size/2 + 12, 5); ctx.lineTo(size/2 - 2, 10); ctx.fill(); ctx.stroke();
            
            ctx.restore();
        }

        function drawClouds(vw, vh) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
            clouds.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, c.r, 0, 6.28);
                ctx.arc(c.x + c.r * 0.5, c.y - c.r * 0.3, c.r * 0.8, 0, 6.28);
                ctx.fill();
                if (state === 'PLAY') c.x -= 0.5;
                if (c.x < -c.r * 2) { c.x = vw + c.r * 2; c.y = Math.random() * vh * 0.4; }
            });
        }

        function update(dt) {
            if (state !== 'PLAY') return;
            const vh = cvs.lH; const vw = cvs.lW;

            // 物理步进
            bird.v += cfg.gravity * dt;
            if (bird.v > cfg.maxV) bird.v = cfg.maxV;
            bird.y += bird.v * dt * (vh / 640); 
            bird.frame += dt * 60; // 动画帧随时间走
            bird.angle = Math.max(-0.2, Math.min(0.2, bird.v / 500));

            if (bird.y < 0) { bird.y = 0; bird.v = 0; }
            if (bird.y > vh) { state = 'DEAD'; saveScore(score); }

            // 管道逻辑
            const pipeW = Math.min(vw * 0.2, 75);
            const pipeInterval = vh * cfg.spacingRatio;

            if (pipes.length === 0 || (vw - pipes[pipes.length-1].x) >= pipeInterval) {
                let gh = vh * cfg.gapRatio;
                pipes.push({ x: vw, t: Math.random() * (vh-gh-150) + 75, g: gh, p: false, c: pipeColors[Math.floor(Math.random()*pipeColors.length)] });
            }

            pipes.forEach((p, i) => {
                p.x -= speed * dt * (vw / 360);
                // 碰撞检测 (缩小判定区，手感更好)
                if (bird.x + bird.r > p.x + 5 && bird.x - bird.r < p.x + pipeW - 5) {
                    if (bird.y - bird.r < p.t + 5 || bird.y + bird.r > p.t + p.g - 5) {
                        state = 'DEAD'; saveScore(score);
                    }
                }
                if (!p.p && p.x + pipeW < bird.x) { score++; p.p = true; speed += 5; }
                if (p.x + pipeW < 0) pipes.splice(i, 1);
            });
        }

        function draw() {
            if (!cvs.lH) return;
            const vw = cvs.lW; const vh = cvs.lH;
            ctx.fillStyle = "#87CEEB"; ctx.fillRect(0, 0, vw, vh);

            drawClouds(vw, vh);

            const pipeW = Math.min(vw * 0.2, 75);
            pipes.forEach(p => {
                ctx.fillStyle = p.c; 
                ctx.fillRect(p.x, 0, pipeW, p.t); 
                ctx.fillRect(p.x, p.t + p.g, pipeW, vh);
                ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
                ctx.strokeRect(p.x, 0, pipeW, p.t); 
                ctx.strokeRect(p.x, p.t + p.g, pipeW, vh);
            });

            drawBird(bird.x, bird.y, bird.angle, bird.frame);

            ctx.fillStyle = "#fff"; ctx.font = `bold ${Math.min(vw*0.15, 60)}px Arial`; ctx.textAlign = "center";
            ctx.fillText(score, vw/2, vh * 0.15);

            if (state !== 'PLAY') {
                ctx.fillStyle = "rgba(255,255,255,0.4)"; ctx.fillRect(0,0,vw,vh);
                ctx.fillStyle = "#FF69B4"; ctx.font = `bold ${Math.min(vw*0.08, 30)}px Arial`;
                ctx.fillText(state === 'WAIT' ? "点击或空格起飞" : "撞飞啦！再来一次", vw/2, vh/2);
            }
        }

        function gameLoop(timestamp) {
            let dt = (timestamp - lastTime) / 1000;
            if (dt > 0.1) dt = 0.016; // 修正后台切换产生的跳帧
            lastTime = timestamp;

            update(dt);
            draw();
            requestAnimationFrame(gameLoop);
        }

        function act(e) {
            if(e && e.type !== 'keydown') e.preventDefault();
            if (state === 'WAIT') state = 'PLAY';
            if (state === 'PLAY') bird.v = cfg.jump;
            else if (state === 'DEAD') init();
        }

        // 事件绑定
        window.addEventListener('mousedown', act);
        window.addEventListener('touchstart', act, {passive: false});
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') act(e); });
        window.addEventListener('resize', init);

        // 排行榜逻辑
        
        const GIST_ID = "3515342b5a2cd459e3e00730127b0fa5";
        const part1 = "ghp_juJdn"; 
        const part2 = "Z07OrroR9Pc8cV34x5KTpXtWp4EFScM";
        const GIST_TOKEN = part1 + part2;
        const FILE_NAME = "rank.json";

async function updateRankDisplay() {
    try {
        const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
            headers: { 'Authorization': `token ${GIST_TOKEN}` },
            cache: 'no-store'
        });
        const gist = await res.json();
        const data = JSON.parse(gist.files[FILE_NAME].content || '[]');

        rankListEl.innerHTML = data.length > 0 ? 
            data.map((it, idx) => `<div class="rank-item ${idx===0?'top':''}"><span>${idx+1}. ${it.name}</span><span>${it.score}分</span></div>`).join('') 
            : '<div style="text-align:center; font-size:12px; color:#aaa;">暂无数据</div>';
        return data;
    } catch (e) {
        console.error("加载失败", e);
        rankListEl.innerHTML = "排行榜同步中...";
    }
}

async function saveScore(s) {
    if (s <= 0) return;
    let data = await updateRankDisplay() || [];

    if (data.length < 5 || s > data[data.length - 1].score) {
        // 修正点2：使用 setTimeout 确保 prompt 不会打断渲染，防止死机
        setTimeout(async () => {
            let name = prompt("纪录被打破！你是谁？") || "飞飞鸟";
            data.push({ name: name.substring(0, 5), score: s });
            data.sort((a, b) => b.score - a.score);
            data = data.slice(0, 5);

            await fetch(`https://api.github.com/gists/${GIST_ID}`, {
                method: 'PATCH',
                headers: { 'Authorization': `token ${GIST_TOKEN}` },
                body: JSON.stringify({
                    files: { [FILE_NAME]: { content: JSON.stringify(data) } }
                })
            });
            updateRankDisplay();
        }, 100);
    }
}

// 修正点3：确保游戏初始化时拉取一次排行榜
window.onload = () => {
    init();
    updateRankDisplay(); 
    requestAnimationFrame(gameLoop);
};
    </script>
</body>
</html>
